<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Крутая страница</title>
    <style>
        /* ===== ГЛОБАЛЬНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0d15;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ===== ФОН С НЕОНОМ И ЧАСТИЦАМИ ===== */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        /* Цветные размытые пятна */
        .bg-effects .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: blobFloat 12s ease-in-out infinite alternate;
        }

        .bg-effects .blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: #6c3ce0;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }
        .bg-effects .blob:nth-child(2) {
            width: 400px;
            height: 400px;
            background: #e03c8a;
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
        }
        .bg-effects .blob:nth-child(3) {
            width: 350px;
            height: 350px;
            background: #3ca0e0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
            opacity: 0.15;
        }

        @keyframes blobFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(60px, -40px) scale(1.1); }
            66% { transform: translate(-30px, 50px) scale(0.9); }
            100% { transform: translate(20px, -20px) scale(1.05); }
        }

        /* Частицы (звёздочки) */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 8s ease-in-out infinite;
        }
        .particle:nth-child(4) { top: 10%; left: 15%; animation-delay: 0s; width: 6px; height: 6px; }
        .particle:nth-child(5) { top: 25%; left: 85%; animation-delay: -2s; width: 3px; height: 3px; }
        .particle:nth-child(6) { top: 70%; left: 10%; animation-delay: -4s; width: 5px; height: 5px; }
        .particle:nth-child(7) { top: 85%; left: 75%; animation-delay: -6s; width: 4px; height: 4px; }
        .particle:nth-child(8) { top: 45%; left: 5%; animation-delay: -1s; width: 3px; height: 3px; }
        .particle:nth-child(9) { top: 55%; left: 92%; animation-delay: -5s; width: 5px; height: 5px; }
        .particle:nth-child(10) { top: 15%; left: 50%; animation-delay: -3s; width: 4px; height: 4px; }

        @keyframes particleFloat {
            0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
            25% { opacity: 0.8; transform: translateY(-30px) scale(1); }
            75% { opacity: 0.6; transform: translateY(20px) scale(0.8); }
        }

        /* ===== ОСНОВНАЯ КАРТОЧКА ===== */
        .card {
            position: relative;
            z-index: 1;
            max-width: 720px;
            width: 100%;
            padding: 50px 45px 55px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-align: center;
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: scale(0.92) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Декоративный глитч-край */
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(108, 60, 224, 0.3), rgba(224, 60, 138, 0.2), rgba(60, 160, 224, 0.3));
            z-index: -1;
            filter: blur(8px);
            opacity: 0.5;
            animation: borderGlow 4s ease-in-out infinite alternate;
        }

        @keyframes borderGlow {
            0% { opacity: 0.3; filter: blur(8px); }
            100% { opacity: 0.7; filter: blur(12px); }
        }

        /* ===== ИКОНКА ===== */
        .icon-wrapper {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(108, 60, 224, 0.2), rgba(224, 60, 138, 0.15));
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 18px;
            font-size: 3.2rem;
            animation: iconPulse 3s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(108, 60, 224, 0.08);
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(3deg); }
        }

        /* ===== ЗАГОЛОВОК (ТЕКСТ, КОТОРЫЙ ВЫ НАПИШЕТЕ) ===== */
        .main-text {
            font-size: clamp(2.4rem, 8vw, 4.8rem);
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 14px;
            background: linear-gradient(145deg, #ffffff 20%, #c8b8f0 60%, #f0b0d0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 80px rgba(108, 60, 224, 0.15);
            letter-spacing: -0.02em;
            animation: textReveal 1s ease;
        }

        @keyframes textReveal {
            0% { opacity: 0; transform: translateY(20px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== ПОДЗАГОЛОВОК (ДОП. ТЕКСТ) ===== */
        .sub-text {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            letter-spacing: 0.03em;
            margin-bottom: 32px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            animation: textReveal 1.2s ease;
        }

        /* ===== КНОПКА ===== */
        .btn {
            display: inline-block;
            padding: 14px 42px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: #fff;
            background: linear-gradient(145deg, #6c3ce0, #9b4dca);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(108, 60, 224, 0.25);
            text-decoration: none;
            animation: textReveal 1.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            transform: scale(0.8);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 50px rgba(108, 60, 224, 0.4);
        }

        .btn:hover::after {
            opacity: 1;
            transform: scale(1);
        }

        .btn:active {
            transform: translateY(0) scale(0.97);
        }

        /* ===== ДЕКОРАТИВНАЯ ЛИНИЯ ===== */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            margin: 18px auto 20px;
            border-radius: 10px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 480px) {
            .card {
                padding: 32px 22px 36px;
                border-radius: 32px;
            }
            .icon-wrapper {
                width: 70px;
                height: 70px;
                font-size: 2.4rem;
            }
            .btn {
                padding: 12px 30px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ФОНОВЫЕ ЭФФЕКТЫ ===== -->
    <div class="bg-effects">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- ===== КАРТОЧКА ===== -->
    <div class="card">

        <!-- ИКОНКА -->
        <div class="icon-wrapper">✨</div>

        <!-- ГЛАВНЫЙ ТЕКСТ (ЗАМЕНИТЕ НА СВОЙ) -->
        <h1 class="main-text" id="mainText">
            на самом деле<br>котенок тут ты
        </h1>

        <!-- ПОДЗАГОЛОВОК -->
        <p class="sub-text" id="subText">
            просто осознай это
        </p>

        <div class="divider"></div>

        <!-- КНОПКА (ДЛЯ ПРИМЕРА) -->
        <button class="btn" id="actionBtn">✨ осознать</button>

    </div>

    <script>
        // ===== НЕБОЛЬШАЯ ИНТЕРАКТИВНОСТЬ =====

        const btn = document.getElementById('actionBtn');
        const mainText = document.getElementById('mainText');
        const subText = document.getElementById('subText');

        // Массив забавных фраз для кнопки (можно заменить на свои)
        const phrases = [
            '😺 мяу?',
            '🔥 осознать',
            '✨ погнали',
            '💫 ещё раз',
            '🤯 вау',
            '🌀 принято'
        ];

        let clickCount = 0;

        btn.addEventListener('click', function() {
            clickCount++;

            // Меняем текст на кнопке
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            btn.textContent = randomPhrase;

            // Лёгкая анимация нажатия
            btn.style.transform = 'scale(0.94)';
            setTimeout(() => {
                btn.style.transform = '';
            }, 150);

            // Можно менять текст на странице (как пасхалка)
            if (clickCount === 3) {
                mainText.textContent = 'ты — котенок 🐾';
                subText.textContent = 'и это прекрасно ✨';
            } else if (clickCount === 6) {
                mainText.textContent = 'котенок — это ты';
                subText.textContent = 'всегда им был 🌙';
            } else if (clickCount > 8) {
                mainText.textContent = 'ну ты понял 😏';
                subText.textContent = 'хватит нажимать 😄';
            }

            // Небольшой эффект на карточке
            document.querySelector('.card').style.transition = 'box-shadow 0.3s ease';
            document.querySelector('.card').style.boxShadow = '0 0 80px rgba(108, 60, 224, 0.15)';
            setTimeout(() => {
                document.querySelector('.card').style.boxShadow = '';
            }, 400);
        });

        // Просто для красоты: если кликнуть на главный текст — он меняется
        mainText.addEventListener('click', function() {
            const texts = [
                'на самом деле котенок тут ты',
                'ты — котенок 🐾',
                'котенок внутри тебя',
                'мяу? мяу! 😺',
                'осознай себя котом'
            ];
            const current = mainText.textContent;
            let next = texts[Math.floor(Math.random() * texts.length)];
            while (next === current && texts.length > 1) {
                next = texts[Math.floor(Math.random() * texts.length)];
            }
            mainText.textContent = next;
            mainText.style.animation = 'none';
            setTimeout(() => {
                mainText.style.animation = 'textReveal 0.5s ease';
            }, 10);
        });

        console.log('🐱 Ты — котенок. Просто прими это.');
    </script>

</body>
</html>
